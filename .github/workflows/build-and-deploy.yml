name: Build and Deploy
on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**/README.md'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Env ⚙️
        uses: actions/setup-node@v4

      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install and Build 🔧
        working-directory: Thomas-Griffin.github.io
        run: |
          CYPRESS_INSTALL_BINARY=0 npm install
          npm run build

      - name: Upload artifact 📦
        uses: actions/upload-pages-artifact@v3
        with:
          path: Thomas-Griffin.github.io/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy 🚀
        id: deployment
        uses: actions/deploy-pages@v4
